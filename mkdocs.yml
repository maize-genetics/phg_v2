# Project information
site_name: Practical Haplotype Graph
site_description: Pangenome system for plant breeding and genetics
site_author: Buckler Lab
site_url: https://phg.maizegenetics.net

# Repository configuration
repo_name: PHGv2
repo_url: https://github.com/maize-genetics/phg_v2

# Theme configuration
theme:
  icon:
    repo: fontawesome/brands/github
  name: material
  custom_dir: docs/index_override
  logo: img/product/phg_logo_white.svg
  favicon: img/product/favicon.png
  palette:
      scheme: default
      primary: green
      accent: green
  features:
    - content.code.select
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - search.highlight
  language: en
  font:
    text: Roboto
    code: Roboto Mono

# Copyright
copyright: Copyright &copy; 2023 - 2026  <a href="https://www.maizegenetics.net "><b>Buckler Lab</b></a>

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/maize-genetics
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/c/BucklerLab

# Markdown extensions
markdown_extensions:
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - tables
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Plugins (search must be listed when using additional plugins; see Material docs)
plugins:
  - search
  - exclude-search:
      exclude:
        - phg_v1/*

# Extra 
extra_javascript:
  - javascript/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

